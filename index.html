<body>
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'yuzu_schedule_v1';
        // 维护所有历史版本的 KEY，最新版本放在最前面
        const HISTORY_STORAGE_KEYS = [
            'yuzu_schedule_v1',
            'wife_daily_app_data_v2',
            'wife_daily_app_data'
        ];
        
        function loadData() {
            try {
                // 先尝试当前版本
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    return JSON.parse(saved);
                }
                
                // 当前版本没有数据，查找旧版本
                for (const oldKey of HISTORY_STORAGE_KEYS) {
                    if (oldKey === STORAGE_KEY) continue; // 跳过当前版本
                    
                    const oldSaved = localStorage.getItem(oldKey);
                    if (oldSaved) {
                        try {
                            const oldData = JSON.parse(oldSaved);
                            // 迁移到当前版本
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(oldData));
                            console.log(`Data migrated from ${oldKey} to ${STORAGE_KEY}`);
                            return oldData;
                        } catch (e) {
                            console.error(`Failed to migrate data from ${oldKey}:`, e);
                            continue; // 这个旧版本数据损坏，尝试下一个
                        }
                    }
                }
                
                // 没有找到任何数据
                return {};
            } catch (e) {
                console.error('Failed to load data:', e);
                return {};
            }
        }
        
        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                console.error('Failed to save data:', e);
            }
        }
        
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        
        function formatMonthKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        }
        
        function calculateMonthStats(date, data) {
            const year = date.getFullYear();
            const month = date.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let napCount = 0;
            let afterSchoolCount = 0;
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dayDate = new Date(year, month, i);
                const dayStr = formatDate(dayDate);
                const dayData = data[dayStr];
                const currentDay = dayDate.getDay();
                const isRaining = dayData?.isRaining || false;
                
                let hasNapWatch;
                if (dayData?.hasNapWatch === false) {
                    hasNapWatch = false;
                } else if (dayData?.hasNapWatch === true) {
                    hasNapWatch = true;
                } else {
                    hasNapWatch = (currentDay === 2 || currentDay === 3);
                }
                
                let hasAfterSchool;
                if (dayData?.hasAfterSchool === false) {
                    hasAfterSchool = false;
                } else if (dayData?.hasAfterSchool === true) {
                    hasAfterSchool = true;
                } else {
                    hasAfterSchool = (currentDay === 1 || currentDay === 3 || (currentDay === 2 && isRaining));
                }
                
                if (hasNapWatch && dayData?.tasks?.nap_watch) {
                    napCount++;
                }
                if (hasAfterSchool && dayData?.tasks?.after_school) {
                    afterSchoolCount++;
                }
            }
            
            return { napCount, afterSchoolCount };
        }
        
        function exportData() {
            const data = loadData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `yuzu-schedule-${formatDate(new Date())}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    saveData(data);
                    appData = data;
                    render();
                    alert('导入成功！');
                } catch (err) {
                    alert('导入失败：文件格式不正确');
                }
            };
            reader.readAsText(file);
        }
        
        function triggerImport() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    importData(e.target.files[0]);
                }
            };
            input.click();
        }
        
        let appData = loadData();
        let selectedDate = new Date();
        let showCalendar = false;
        let calendarMonth = new Date(selectedDate);
        let showCelebration = false;
        let showCustomTaskModal = false;
        
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        function getSections(dateStr, isRaining, dayData) {
            const date = new Date(dateStr);
            const currentDay = date.getDay();
            const sections = [];
            
            sections.push({
                id: 'daily',
                title: '日常必备',
                items: [
                    { id: 'alipay', text: '支付宝打卡，花88VIP 2块钱' },
                    { id: 'homework', text: '家长群里发每日作业' }
                ]
            });
            
            // 📝 临时加办
            const customTasks = dayData?.customTasks || [];
            sections.push({
                id: 'custom',
                title: '📝 临时加办',
                items: customTasks.map(task => ({
                    id: task.id,
                    text: task.text,
                    removable: true,
                    isCustom: true
                })),
                isCustomSection: true
            });
            
            const schoolItems = [];
            if (currentDay === 2 || currentDay === 4) {
                schoolItems.push({ id: 'morning_read', text: '早起早读' });
            }
            
            let hasNapWatch;
            if (dayData?.hasNapWatch === false) {
                hasNapWatch = false;
            } else if (dayData?.hasNapWatch === true) {
                hasNapWatch = true;
            } else {
                hasNapWatch = (currentDay === 2 || currentDay === 3);
            }
            
            let hasAfterSchool;
            if (dayData?.hasAfterSchool === false) {
                hasAfterSchool = false;
            } else if (dayData?.hasAfterSchool === true) {
                hasAfterSchool = true;
            } else {
                hasAfterSchool = (currentDay === 1 || currentDay === 3 || (currentDay === 2 && isRaining));
            }
            
            if (hasNapWatch) {
                schoolItems.push({ id: 'nap_watch', text: '看午睡', removable: true });
            }
            if (hasAfterSchool) {
                schoolItems.push({ id: 'after_school', text: '延时服务', removable: true });
            }
            
            sections.push({
                id: 'school',
                title: '学校教务',
                showRainToggle: currentDay === 2,
                showAddNap: !hasNapWatch,
                showAddAfterSchool: !hasAfterSchool,
                items: schoolItems
            });
            
            sections.push({
                id: 'youzi',
                title: '柚子晚间流水线',
                items: [
                    { id: 'yz_massage', text: '给柚子按摩' },
                    { id: 'yz_study', text: '学习打卡、收拾书包、安排读绘本' },
                    { id: 'yz_med', text: '吃钙铁锌和DHA、涂护指油' },
                    { id: 'yz_prep', text: '准备明天营养品、衣服和鞋子' }
                ]
            });
            
            return sections;
        }
        
        function render() {
            const dateStr = formatDate(selectedDate);
            const todayStr = formatDate(new Date());
            const isToday = dateStr === todayStr;
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false, customTasks: [] };
            const tasks = dayData.tasks || {};
            const isRaining = dayData.isRaining || false;
            const sections = getSections(dateStr, isRaining, dayData);
            
            const stats = calculateMonthStats(selectedDate, appData);
            
            const allCurrentTasks = sections.flatMap(s => s.items);
            const totalTasksCount = allCurrentTasks.length;
            const completedTasksCount = allCurrentTasks.filter(t => tasks[t.id]).length;
            const progressPercent = totalTasksCount === 0 ? 0 : Math.round((completedTasksCount / totalTasksCount) * 100);
            
            let html = '';
            
            html += `
            <div class="header">
                <div class="header-top">
                    <div class="header-title">老婆的专属清单</div>
                    ${!isToday ? `
                    <button class="btn-back-today" onclick="goToToday()">回到今天</button>
                    ` : ''}
                </div>
                
                <div class="date-nav">
                    <button class="date-btn" onclick="changeDate(-1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <div class="date-display">
                        <button class="date-btn-main" onclick="toggleCalendar()">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span class="date-text">${dateStr}</span>
                            <span class="date-weekday">${dayNames[selectedDate.getDay()]}</span>
                        </button>
                    </div>
                    <button class="date-btn" onclick="changeDate(1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="progress-section">
                    <div class="progress-header">
                        <div class="progress-label ${isToday ? 'progress-label-today' : 'progress-label-other'}">
                            ${isToday ? '今日进度' : '当日进度'}
                        </div>
                        <div class="progress-text ${isToday ? 'progress-text-today' : 'progress-text-other'}">
                            ${completedTasksCount} / ${totalTasksCount}
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar ${progressPercent === 100 ? 'progress-bar-done' : (isToday ? 'progress-bar-today' : 'progress-bar-other')}"
                             style="width: ${progressPercent}%"></div>
                    </div>
                </div>
                
                <div class="stats-card">
                    <div class="stats-title">本月统计</div>
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-label">看午睡：</span>
                            <span class="stat-value">${stats.napCount}次</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">延时课：</span>
                            <span class="stat-value">${stats.afterSchoolCount}次</span>
                        </div>
                    </div>
                </div>
            </div>
            `;
            
            if (showCalendar) {
                const year = calendarMonth.getFullYear();
                const month = calendarMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                
                let calendarDays = '';
                for (let i = 0; i < firstDay; i++) {
                    calendarDays += '<div class="calendar-day empty"><span class="calendar-day-number">0</span></div>';
                }
                for (let i = 1; i <= daysInMonth; i++) {
                    const cellDate = new Date(year, month, i);
                    const cellDateStr = formatDate(cellDate);
                    const isSelected = cellDateStr === dateStr;
                    const isCellToday = cellDateStr === todayStr;
                    calendarDays += `
                    <button class="calendar-day ${isSelected ? 'selected' : ''} ${isCellToday ? 'today' : ''}"
                            onclick="selectDate(${year}, ${month}, ${i})">
                        <span class="calendar-day-number">${i}</span>
                    </button>
                    `;
                }
                
                html += `
                <div class="modal-overlay fade-in" onclick="closeCalendar()">
                    <div class="modal-content zoom-in" onclick="event.stopPropagation()">
                        <div class="calendar-header">
                            <button class="calendar-nav-btn" onclick="changeCalendarMonth(-1)">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                </svg>
                            </button>
                            <div class="calendar-title">${year}年 ${month + 1}月</div>
                            <button class="calendar-nav-btn" onclick="changeCalendarMonth(1)">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="calendar-body">
                            <div class="calendar-weekdays">
                                ${['日', '一', '二', '三', '四', '五', '六'].map(d => `<div class="calendar-weekday">${d}</div>`).join('')}
                            </div>
                            <div class="calendar-days">${calendarDays}</div>
                        </div>
                        <div class="calendar-footer">
                            <button class="cancel-btn" onclick="closeCalendar()">取消</button>
                        </div>
                    </div>
                </div>
                `;
            }
            
            if (showCelebration) {
                html += `
                <div class="celebration">
                    <div class="celebration-content animate-bounce">
                        <span class="celebration-text">任务全搞定啦，老婆最棒！</span>
                    </div>
                </div>
                `;
            }
            
            if (showCustomTaskModal) {
                html += `
                <div class="modal-overlay fade-in" onclick="closeCustomTaskModal()">
                    <div class="modal-content zoom-in" onclick="event.stopPropagation()">
                        <div class="calendar-header">
                            <div class="calendar-title">添加临时待办</div>
                        </div>
                        <div class="calendar-body">
                            <input type="text" id="customTaskInput" placeholder="请输入待办内容..." 
                                   style="width: 100%; padding: 12px; border: 2px solid #e7e5e4; border-radius: 12px; font-size: 16px; outline: none;">
                        </div>
                        <div class="calendar-footer" style="gap: 8px; display: flex; justify-content: flex-end;">
                            <button class="cancel-btn" onclick="closeCustomTaskModal()">取消</button>
                            <button class="cancel-btn" onclick="addCustomTask()" 
                                    style="background-color: #fff1f2; color: #e11d48;">确定</button>
                        </div>
                    </div>
                </div>
                `;
            }
            
            html += '<div class="main-content">';
            
            sections.forEach(section => {
                let itemsHtml = '';
                
                if (section.showRainToggle) {
                    itemsHtml += `
                    <div class="rain-toggle">
                        <div class="rain-label">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 00-10.233-.654.65.65 0 01-1.257 0 3.001 3.001 0 00-1.5 2.553"></path>
                            </svg>
                            <span>今天下雨了吗？(触发延时)</span>
                        </div>
                        <div class="toggle-switch ${isRaining ? 'toggle-on' : 'toggle-off'}" onclick="toggleRain()">
                            <div class="toggle-dot ${isRaining ? 'toggle-dot-on' : 'toggle-dot-off'}"></div>
                        </div>
                    </div>
                    `;
                }
                
                if (section.showAddNap) {
                    itemsHtml += `
                    <li class="task-item">
                        <button class="add-btn" onclick="addNapWatch()">
                            <span>+ 添加看午睡</span>
                        </button>
                    </li>
                    `;
                }
                
                if (section.showAddAfterSchool) {
                    itemsHtml += `
                    <li class="task-item">
                        <button class="add-btn" onclick="addAfterSchool()">
                            <span>+ 添加延时服务</span>
                        </button>
                    </li>
                    `;
                }
                
                // 自定义任务 section 添加新待办按钮
                if (section.isCustomSection) {
                    itemsHtml += `
                    <li class="task-item">
                        <button class="add-btn" onclick="openCustomTaskModal()">
                            <span>+ 添加新待办</span>
                        </button>
                    </li>
                    `;
                }
                
                if (section.items.length === 0 && !section.showAddNap && !section.showAddAfterSchool && !section.isCustomSection) {
                    itemsHtml += '<li class="empty-message">这一天该板块没有任务哦～</li>';
                } else {
                    section.items.forEach(item => {
                        const isCompleted = !!tasks[item.id];
                        if (item.removable) {
                            itemsHtml += `
                            <li class="task-item">
                                <button class="task-btn ${isCompleted ? 'completed' : ''}" onclick="toggleTask('${item.id}')">
                                    <div class="task-checkbox ${isCompleted ? 'checked' : 'unchecked'}">
                                        ${isCompleted ? '✓' : ''}
                                    </div>
                                    <span class="task-text ${isCompleted ? 'completed' : 'uncompleted'}">${item.text}</span>
                                </button>
                                <button class="task-remove-btn" onclick="removeTask('${item.id}')">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                    </svg>
                                </button>
                            </li>
                            `;
                        } else {
                            itemsHtml += `
                            <li class="task-item">
                                <button class="task-btn ${isCompleted ? 'completed' : ''}" onclick="toggleTask('${item.id}')">
                                    <div class="task-checkbox ${isCompleted ? 'checked' : 'unchecked'}">
                                        ${isCompleted ? '✓' : ''}
                                    </div>
                                    <span class="task-text ${isCompleted ? 'completed' : 'uncompleted'}">${item.text}</span>
                                </button>
                            </li>
                            `;
                        }
                    });
                }
                
                let headerClass = '';
                let titleClass = '';
                if (section.id === 'daily') {
                    headerClass = 'section-header-daily';
                    titleClass = 'section-title-daily';
                } else if (section.id === 'school') {
                    headerClass = 'section-header-school';
                    titleClass = 'section-title-school';
                } else if (section.id === 'custom') {
                    headerClass = 'section-header-custom';
                    titleClass = 'section-title-custom';
                } else {
                    headerClass = 'section-header-youzi';
                    titleClass = 'section-title-youzi';
                }
                
                html += `
                <div class="section-card">
                    <div class="section-header ${headerClass}">
                        <div class="section-icon"></div>
                        <div class="section-title ${titleClass}">${section.title}</div>
                    </div>
                    <div class="section-content">
                        <ul class="task-list">
                            ${itemsHtml}
                        </ul>
                    </div>
                </div>
                `;
            });
            
            html += `
                <div class="export-import-section">
                    <button class="export-btn" onclick="exportData()">📤 导出数据</button>
                    <button class="import-btn" onclick="triggerImport()">📥 导入数据</button>
                </div>
            </div>
            `;
            
            document.getElementById('app').innerHTML = html;
        }
        
        window.changeDate = function(offset) {
            selectedDate.setDate(selectedDate.getDate() + offset);
            render();
        };
        
        window.goToToday = function() {
            selectedDate = new Date();
            render();
        };
        
        window.toggleCalendar = function() {
            showCalendar = !showCalendar;
            calendarMonth = new Date(selectedDate);
            render();
        };
        
        window.closeCalendar = function() {
            showCalendar = false;
            render();
        };
        
        window.selectDate = function(year, month, day) {
            selectedDate = new Date(year, month, day);
            showCalendar = false;
            render();
        };
        
        window.changeCalendarMonth = function(offset) {
            calendarMonth.setMonth(calendarMonth.getMonth() + offset);
            render();
        };
        
        window.toggleTask = function(taskId) {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false, customTasks: [] };
            const isCurrentlyCompleted = dayData.tasks[taskId];
            const newTasks = { ...dayData.tasks, [taskId]: !isCurrentlyCompleted };
            
            const sections = getSections(dateStr, dayData.isRaining || false, dayData);
            const allCurrentTasks = sections.flatMap(s => s.items);
            const newCompletedCount = allCurrentTasks.filter(t => newTasks[t.id]).length;
            
            if (newCompletedCount === allCurrentTasks.length && allCurrentTasks.length > 0 && !isCurrentlyCompleted) {
                showCelebration = true;
                setTimeout(() => {
                    showCelebration = false;
                    render();
                }, 3000);
            }
            
            appData[dateStr] = { ...dayData, tasks: newTasks };
            saveData(appData);
            render();
        };
        
        window.toggleRain = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, isRaining: !dayData.isRaining };
            saveData(appData);
            render();
        };
        
        window.addNapWatch = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, hasNapWatch: true };
            saveData(appData);
            render();
        };
        
        window.addAfterSchool = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, hasAfterSchool: true };
            saveData(appData);
            render();
        };
        
        window.removeTask = function(taskId) {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false, customTasks: [] };
            const newTasks = { ...dayData.tasks };
            delete newTasks[taskId];
            
            if (taskId === 'nap_watch') {
                appData[dateStr] = { ...dayData, tasks: newTasks, hasNapWatch: false };
            } else if (taskId === 'after_school') {
                appData[dateStr] = { ...dayData, tasks: newTasks, hasAfterSchool: false };
            } else if (taskId.startsWith('custom_')) {
                // 删除自定义任务
                const newCustomTasks = (dayData.customTasks || []).filter(t => t.id !== taskId);
                appData[dateStr] = { ...dayData, tasks: newTasks, customTasks: newCustomTasks };
            } else {
                appData[dateStr] = { ...dayData, tasks: newTasks };
            }
            
            saveData(appData);
            render();
        };
        
        window.openCustomTaskModal = function() {
            showCustomTaskModal = true;
            render();
            // 打开弹窗后自动聚焦输入框
            setTimeout(() => {
                const input = document.getElementById('customTaskInput');
                if (input) input.focus();
            }, 100);
        };
        
        window.closeCustomTaskModal = function() {
            showCustomTaskModal = false;
            render();
        };
        
        window.addCustomTask = function() {
            const input = document.getElementById('customTaskInput');
            const text = input?.value?.trim();
            if (!text) {
                alert('请输入待办内容！');
                return;
            }
            
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false, customTasks: [] };
            const newCustomTask = {
                id: 'custom_' + Date.now(),
                text: text
            };
            
            appData[dateStr] = {
                ...dayData,
                customTasks: [...(dayData.customTasks || []), newCustomTask]
            };
            
            saveData(appData);
            showCustomTaskModal = false;
            render();
        };
        
        window.exportData = exportData;
        window.triggerImport = triggerImport;
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {
                });
            });
        }
        
        render();
    </script>
</body>
</html>
