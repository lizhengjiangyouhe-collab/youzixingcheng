<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柚子星程</title>
    
    <!-- 防缓存设置 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="柚子星程">
    <link rel="apple-touch-icon" href="tubiao.png">
    <link rel="icon" type="image/png" href="tubiao.png">
    <meta name="theme-color" content="#f43f5e">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce { animation: bounce 1s infinite; }
    </style>
</head>
<body class="min-h-screen bg-stone-100 font-sans text-stone-800 pb-10">
    <div id="app"></div>

    <script>
        const STORAGE_KEY = 'wife_daily_app_data_v2';
        
        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : {};
            } catch (e) {
                return {};
            }
        }
        
        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        
        function formatMonthKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            return `${y}-${m}`;
        }
        
        function calculateMonthStats(date, data) {
            const monthKey = formatMonthKey(date);
            const year = date.getFullYear();
            const month = date.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let napCount = 0;
            let afterSchoolCount = 0;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDate = new Date(year, month, day);
                const dayStr = formatDate(dayDate);
                const dayData = data[dayStr];
                
                if (dayData) {
                    if (dayData.hasNapWatch && dayData.tasks?.nap_watch) {
                        napCount++;
                    }
                    if (dayData.hasAfterSchool && dayData.tasks?.after_school) {
                        afterSchoolCount++;
                    }
                }
            }
            
            return { napCount, afterSchoolCount };
        }
        
        let appData = loadData();
        let selectedDate = new Date();
        let showCalendar = false;
        let calendarMonth = new Date(selectedDate);
        let showCelebration = false;
        
        const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        function getSections(dateStr, isRaining, dayData) {
            const date = new Date(dateStr);
            const currentDay = date.getDay();
            const sections = [];
            
            sections.push({
                id: 'daily',
                title: '日常必备',
                color: 'bg-amber-50',
                textColor: 'text-amber-800',
                items: [
                    { id: 'alipay', text: '支付宝打卡，花88VIP 2块钱' },
                    { id: 'homework', text: '家长群里发每日作业' }
                ]
            });
            
            const schoolItems = [];
            if (currentDay === 2 || currentDay === 4) {
                schoolItems.push({ id: 'morning_read', text: '早起早读' });
            }
            
            let hasNapWatch;
            if (dayData?.hasNapWatch === false) {
                hasNapWatch = false;
            } else if (dayData?.hasNapWatch === true) {
                hasNapWatch = true;
            } else {
                hasNapWatch = (currentDay === 2 || currentDay === 3);
            }
            
            let hasAfterSchool;
            if (dayData?.hasAfterSchool === false) {
                hasAfterSchool = false;
            } else if (dayData?.hasAfterSchool === true) {
                hasAfterSchool = true;
            } else {
                hasAfterSchool = (currentDay === 1 || currentDay === 3 || (currentDay === 2 && isRaining));
            }
            
            if (hasNapWatch) {
                schoolItems.push({ id: 'nap_watch', text: '看午睡', removable: true });
            }
            if (hasAfterSchool) {
                schoolItems.push({ id: 'after_school', text: '延时服务', removable: true });
            }
            
            sections.push({
                id: 'school',
                title: '学校教务',
                color: 'bg-blue-50',
                textColor: 'text-blue-800',
                showRainToggle: currentDay === 2,
                showAddNap: !hasNapWatch,
                showAddAfterSchool: !hasAfterSchool,
                items: schoolItems
            });
            
            sections.push({
                id: 'youzi',
                title: '柚子晚间流水线',
                color: 'bg-rose-50',
                textColor: 'text-rose-800',
                items: [
                    { id: 'yz_massage', text: '给柚子按摩' },
                    { id: 'yz_study', text: '学习打卡、收拾书包、安排读绘本' },
                    { id: 'yz_med', text: '吃钙铁锌和DHA、涂护指油' },
                    { id: 'yz_prep', text: '准备明天营养品、衣服和鞋子' }
                ]
            });
            
            return sections;
        }
        
        function render() {
            const dateStr = formatDate(selectedDate);
            const todayStr = formatDate(new Date());
            const isToday = dateStr === todayStr;
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            const tasks = dayData.tasks || {};
            const isRaining = dayData.isRaining || false;
            const sections = getSections(dateStr, isRaining, dayData);
            
            const stats = calculateMonthStats(selectedDate, appData);
            
            const allCurrentTasks = sections.flatMap(s => s.items);
            const totalTasksCount = allCurrentTasks.length;
            const completedTasksCount = allCurrentTasks.filter(t => tasks[t.id]).length;
            const progressPercent = totalTasksCount === 0 ? 0 : Math.round((completedTasksCount / totalTasksCount) * 100);
            
            let html = '';
            
            html += `
            <div class="bg-white px-5 pt-8 pb-5 shadow-sm sticky top-0 z-10 rounded-b-3xl">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-xl font-bold text-stone-800 flex items-center gap-2">
                        老婆的专属清单
                    </h1>
                    ${!isToday ? `
                    <button onclick="goToToday()" class="text-xs text-rose-600 font-semibold bg-rose-50 px-3 py-1.5 rounded-full">
                        回到今天
                    </button>
                    ` : ''}
                </div>
                
                <div class="flex items-center justify-between bg-stone-50 rounded-2xl p-1 mb-4 border border-stone-100">
                    <button onclick="changeDate(-1)" class="p-2 hover:bg-white rounded-xl text-stone-400 hover:text-stone-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    
                    <div class="flex flex-col items-center justify-center flex-1 py-1">
                        <button onclick="toggleCalendar()" class="flex items-center gap-1.5 bg-white px-4 py-2 rounded-xl shadow-sm border border-stone-100">
                            <span class="text-[14px] font-bold text-stone-700">${dateStr}</span>
                            <span class="text-[14px] font-bold text-stone-700 border-l border-stone-200 pl-1.5">${dayNames[selectedDate.getDay()]}</span>
                        </button>
                    </div>
                    
                    <button onclick="changeDate(1)" class="p-2 hover:bg-white rounded-xl text-stone-400 hover:text-stone-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="relative pt-1 mb-2">
                    <div class="flex mb-2 items-center justify-between">
                        <div class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full ${isToday ? 'text-rose-600 bg-rose-100' : 'text-stone-500 bg-stone-200'}">
                            ${isToday ? '今日进度' : '当日进度'}
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-bold inline-block ${isToday ? 'text-rose-600' : 'text-stone-500'}">
                                ${completedTasksCount} / ${totalTasksCount}
                            </span>
                        </div>
                    </div>
                    <div class="overflow-hidden h-2 mb-2 text-xs flex rounded-full bg-stone-100">
                        <div style="width: ${progressPercent}%" class="h-full ${progressPercent === 100 ? 'bg-green-400' : (isToday ? 'bg-rose-400' : 'bg-stone-400')}"></div>
                    </div>
                </div>
                
                <div class="bg-purple-50 rounded-2xl p-3 border border-purple-100">
                    <div class="text-xs font-bold text-purple-800 mb-2">本月统计</div>
                    <div class="flex gap-4 text-sm">
                        <div class="flex-1">
                            <span class="text-purple-600">看午睡: </span>
                            <span class="font-bold text-purple-800">${stats.napCount}次</span>
                        </div>
                        <div class="flex-1">
                            <span class="text-purple-600">延时课: </span>
                            <span class="font-bold text-purple-800">${stats.afterSchoolCount}次</span>
                        </div>
                    </div>
                </div>
            </div>
            `;
            
            if (showCalendar) {
                const year = calendarMonth.getFullYear();
                const month = calendarMonth.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                
                let calendarDays = '';
                for (let i = 0; i < firstDay; i++) {
                    calendarDays += '<div class="p-2 text-center text-transparent">0</div>';
                }
                for (let i = 1; i <= daysInMonth; i++) {
                    const cellDate = new Date(year, month, i);
                    const cellDateStr = formatDate(cellDate);
                    const isSelected = cellDateStr === dateStr;
                    const isCellToday = cellDateStr === todayStr;
                    calendarDays += `
                    <button onclick="selectDate(${year}, ${month}, ${i})" class="p-2 w-full flex justify-center items-center rounded-full ${isSelected ? 'bg-rose-500 text-white font-bold' : isCellToday ? 'bg-rose-100 text-rose-600 font-bold' : 'hover:bg-stone-100 text-stone-700'}">
                        <span class="w-8 h-8 flex items-center justify-center rounded-full">${i}</span>
                    </button>
                    `;
                }
                
                html += `
                <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onclick="closeCalendar()">
                    <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden" onclick="event.stopPropagation()">
                        <div class="p-4 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                            <button onclick="changeCalendarMonth(-1)" class="p-2 hover:bg-stone-200 rounded-full text-stone-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                </svg>
                            </button>
                            <h3 class="font-bold text-stone-800">${year}年 ${month + 1}月</h3>
                            <button onclick="changeCalendarMonth(1)" class="p-2 hover:bg-stone-200 rounded-full text-stone-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="p-4">
                            <div class="grid grid-cols-7 gap-1 mb-2">
                                ${['日', '一', '二', '三', '四', '五', '六'].map(d => `<div class="text-center text-xs font-bold text-stone-400 py-1">${d}</div>`).join('')}
                            </div>
                            <div class="grid grid-cols-7 gap-1">${calendarDays}</div>
                        </div>
                        <div class="p-3 border-t border-stone-100 bg-stone-50 flex justify-end">
                            <button onclick="closeCalendar()" class="px-4 py-2 text-sm font-bold text-stone-500 hover:bg-stone-200 rounded-xl">
                                取消
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }
            
            if (showCelebration) {
                html += `
                <div class="fixed inset-0 pointer-events-none flex items-center justify-center z-50">
                    <div class="bg-white/95 px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 animate-bounce border border-rose-100">
                        <span class="font-bold text-rose-600">任务全搞定啦，老婆最棒！</span>
                    </div>
                </div>
                `;
            }
            
            html += '<div class="p-4 space-y-5 max-w-md mx-auto mt-1">';
            
            sections.forEach(section => {
                let itemsHtml = '';
                
                if (section.showRainToggle) {
                    itemsHtml += `
                <div class="mx-2 my-2 p-3 bg-blue-50 rounded-2xl flex items-center justify-between border border-blue-100">
                    <div class="flex items-center gap-2 text-blue-800 text-[13px] font-bold">
                        <span>今天下雨了吗？(触发延时)</span>
                    </div>
                    <button onclick="toggleRain()" class="relative inline-flex h-6 w-11 items-center rounded-full ${isRaining ? 'bg-blue-500' : 'bg-stone-300'}">
                        <span class="inline-block h-4 w-4 transform rounded-full bg-white ${isRaining ? 'translate-x-6' : 'translate-x-1'}"></span>
                    </button>
                </div>
                `;
                }
                
                if (section.showAddNap) {
                    itemsHtml += `
                <li>
                    <button onclick="addNapWatch()" class="w-full flex items-center justify-center gap-2 px-3 py-3 rounded-2xl border-2 border-dashed border-blue-300 text-blue-600 hover:bg-blue-50 transition-colors">
                        <span>+ 添加看午睡</span>
                    </button>
                </li>
                `;
                }
                
                if (section.showAddAfterSchool) {
                    itemsHtml += `
                <li>
                    <button onclick="addAfterSchool()" class="w-full flex items-center justify-center gap-2 px-3 py-3 rounded-2xl border-2 border-dashed border-blue-300 text-blue-600 hover:bg-blue-50 transition-colors">
                        <span>+ 添加延时服务</span>
                    </button>
                </li>
                `;
                }
                
                if (section.items.length === 0 && !section.showAddNap && !section.showAddAfterSchool) {
                    itemsHtml += '<li class="p-4 text-center text-stone-400 text-sm font-medium">这一天该板块没有任务哦～</li>';
                } else {
                    section.items.forEach(item => {
                        const isCompleted = !!tasks[item.id];
                        if (item.removable) {
                            itemsHtml += `
                        <li class="relative">
                            <button onclick="toggleTask('${item.id}')" class="w-full flex items-center gap-3.5 px-3 py-3.5 rounded-2xl text-left hover:bg-stone-50 ${isCompleted ? 'opacity-60 bg-stone-50' : ''}">
                                <div class="flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center ${isCompleted ? 'bg-rose-500 text-white' : 'border-2 border-stone-300'}">
                                    ${isCompleted ? '✓' : ''}
                                </div>
                                <span class="flex-1 text-[14.5px] ${isCompleted ? 'text-stone-400 line-through' : 'text-stone-700 font-semibold'}">
                                    ${item.text}
                                </span>
                            </button>
                            <button onclick="removeTask('${item.id}')" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-stone-400 hover:text-red-500">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </li>
                        `;
                        } else {
                            itemsHtml += `
                        <li>
                            <button onclick="toggleTask('${item.id}')" class="w-full flex items-center gap-3.5 px-3 py-3.5 rounded-2xl text-left hover:bg-stone-50 ${isCompleted ? 'opacity-60 bg-stone-50' : ''}">
                                <div class="flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center ${isCompleted ? 'bg-rose-500 text-white' : 'border-2 border-stone-300'}">
                                    ${isCompleted ? '✓' : ''}
                                </div>
                                <span class="flex-1 text-[14.5px] ${isCompleted ? 'text-stone-400 line-through' : 'text-stone-700 font-semibold'}">
                                    ${item.text}
                                </span>
                            </button>
                        </li>
                        `;
                        }
                    });
                }
                
                html += `
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-stone-100">
                    <div class="px-5 py-3.5 ${section.color} flex items-center gap-3 border-b border-white">
                        <h2 class="text-base font-bold ${section.textColor}">${section.title}</h2>
                    </div>
                    <div class="p-2">
                        <ul class="space-y-1">
                            ${itemsHtml}
                        </ul>
                    </div>
                </div>
                `;
            });
            
            html += '</div>';
            
            document.getElementById('app').innerHTML = html;
        }
        
        window.changeDate = function(offset) {
            selectedDate.setDate(selectedDate.getDate() + offset);
            render();
        };
        
        window.goToToday = function() {
            selectedDate = new Date();
            render();
        };
        
        window.toggleCalendar = function() {
            showCalendar = !showCalendar;
            calendarMonth = new Date(selectedDate);
            render();
        };
        
        window.closeCalendar = function() {
            showCalendar = false;
            render();
        };
        
        window.selectDate = function(year, month, day) {
            selectedDate = new Date(year, month, day);
            showCalendar = false;
            render();
        };
        
        window.changeCalendarMonth = function(offset) {
            calendarMonth.setMonth(calendarMonth.getMonth() + offset);
            render();
        };
        
        window.toggleTask = function(taskId) {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            const isCurrentlyCompleted = dayData.tasks[taskId];
            const newTasks = { ...dayData.tasks, [taskId]: !isCurrentlyCompleted };
            
            const sections = getSections(dateStr, dayData.isRaining || false, dayData);
            const allCurrentTasks = sections.flatMap(s => s.items);
            const newCompletedCount = allCurrentTasks.filter(t => newTasks[t.id]).length;
            
            if (newCompletedCount === allCurrentTasks.length && allCurrentTasks.length > 0 && !isCurrentlyCompleted) {
                showCelebration = true;
                setTimeout(() => {
                    showCelebration = false;
                    render();
                }, 3000);
            }
            
            appData[dateStr] = { ...dayData, tasks: newTasks };
            saveData(appData);
            render();
        };
        
        window.toggleRain = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, isRaining: !dayData.isRaining };
            saveData(appData);
            render();
        };
        
        window.addNapWatch = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, hasNapWatch: true };
            saveData(appData);
            render();
        };
        
        window.addAfterSchool = function() {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            appData[dateStr] = { ...dayData, hasAfterSchool: true };
            saveData(appData);
            render();
        };
        
        window.removeTask = function(taskId) {
            const dateStr = formatDate(selectedDate);
            const dayData = appData[dateStr] || { tasks: {}, isRaining: false };
            const newTasks = { ...dayData.tasks };
            delete newTasks[taskId];
            
            if (taskId === 'nap_watch') {
                appData[dateStr] = { ...dayData, tasks: newTasks, hasNapWatch: false };
            } else if (taskId === 'after_school') {
                appData[dateStr] = { ...dayData, tasks: newTasks, hasAfterSchool: false };
            } else {
                appData[dateStr] = { ...dayData, tasks: newTasks };
            }
            
            saveData(appData);
            render();
        };
        
        render();
    </script>
</body>
</html>
